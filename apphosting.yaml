# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

buildConfig:
  installCommand: 'npm install'
  buildCommand: 'npm run build'

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1

env:
  - variable: GOOGLE_SHEET_ID
    value: 1IcVFTlCACocbeSbeDmN9HhIS2gC47pQj1JUe7grynnk
    availability:
      - BUILD
      - RUNTIME
  - variable: SMTP_HOST
    value: smtp.gmail.com
    availability:
      - RUNTIME
  - variable: SMTP_PORT
    value: "587"
    availability:
      - RUNTIME
  - variable: SMTP_SECURE
    value: "false"
    availability:
      - RUNTIME
  - variable: SMTP_FROM
    value: '"HybridX" <info@train.hybridx.club>'
    availability:
      - RUNTIME
  # ── Email deliverability ──────────────────────────────────────────────────
  # Send from the dedicated subdomain train.hybridx.club (authenticate it in
  # Resend with SPF + DKIM + DMARC). Replies go to the monitored root mailbox.
  - variable: EMAIL_FROM
    value: '"HybridX" <info@train.hybridx.club>'
    availability:
      - RUNTIME
  - variable: EMAIL_REPLY_TO
    value: training@hybridx.club
    availability:
      - RUNTIME
  # Resend API key. When set, all mail goes through Resend instead of Gmail SMTP.
  # TEMPORARILY DISABLED: the App Hosting backend's service account doesn't yet
  # have access to this secret, which fails the whole build in the preparer step
  # ("Misconfigured Secret" / PermissionDenied). Mail falls back to Gmail SMTP
  # while this is commented out. To re-enable, first grant access:
  #   firebase apphosting:secrets:grantaccess RESEND_API_KEY --backend <backend-id>
  # (find the backend id with: firebase apphosting:backends:list)
  # then uncomment the block below.
  # - variable: RESEND_API_KEY
  #   secret: RESEND_API_KEY
  #   availability:
  #     - RUNTIME
  - variable: NEXT_PUBLIC_HYROX_SCRIPT_URL
    value: https://script.google.com/macros/s/AKfycbyAtEd75pgGttM3iStIgq63fJNFCfKA0NZXq87l4aBhNHJwN0ZhamRPwVC3fVEJx1LeJw/exec
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_SERVICE_ACCOUNT_EMAIL
    secret: GOOGLE_SERVICE_ACCOUNT_EMAIL
    availability:
      - RUNTIME
  - variable: GOOGLE_PRIVATE_KEY
    secret: GOOGLE_PRIVATE_KEY
    availability:
      - RUNTIME
  - variable: SMTP_USER
    secret: SMTP_USER
    availability:
      - RUNTIME
  - variable: SMTP_PASSWORD
    secret: SMTP_PASSWORD
    availability:
      - RUNTIME
