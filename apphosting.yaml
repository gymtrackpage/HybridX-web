# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1

scripts:
  buildCommand: npm run build

env:
  - variable: GOOGLE_SHEET_ID
    value: 1D2qfGiF2FIlcDxzLKgU2IuY5c5O0MtxeVE-GNuZ6eHo
    availability:
      - BUILD
      - RUNTIME
  - variable: SMTP_HOST
    value: smtp.gmail.com
    availability:
      - RUNTIME
  - variable: SMTP_PORT
    value: "587"
    availability:
      - RUNTIME
  - variable: SMTP_SECURE
    value: "false"
    availability:
      - RUNTIME
  - variable: SMTP_FROM
    value: '"HybridX" <noreply@hybridx.com>'
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_HYROX_SCRIPT_URL
    value: https://script.google.com/macros/s/AKfycbyAtEd75pgGttM3iStIgq63fJNFCfKA0NZXq87l4aBhNHJwN0ZhamRPwVC3fVEJx1LeJw/exec
    availability:
      - BUILD
      - RUNTIME
